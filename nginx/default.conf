server {
    listen 80;
    server_name localhost; # En desarrollo usamos localhost

    location / {
        # 'web' es el nombre del servicio de Apache en el docker-compose
        proxy_pass http://web:80;
        
        # Le pasamos la IP real del visitante a Apache por si tu código PHP la necesita
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /phpmyadmin/ {
        # 'phpmyadmin' es el nombre del servicio de phpmyadmin en el docker-compose
        proxy_pass http://phpmyadmin:80/;
        
        # Le pasamos la IP real del visitante a Apache por si tu código PHP la necesita
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}